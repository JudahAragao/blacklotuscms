services:
  app:
    image: ghcr.io/${GITHUB_USER}/blacklotuscms:latest
    container_name: blacklotus-blue-app
    ports:
      - "3001:3000"
    volumes:
      - blacklotus_blue_uploads:/app/uploads
      - blacklotus_blue_themes:/app/themes
      - blacklotus_blue_plugins:/app/plugins
      - ./.env:/app/.env
    env_file:
      - .env
    networks:
      - blacklotus-network
    restart: unless-stopped

volumes:
  blacklotus_blue_uploads:
  blacklotus_blue_themes:
  blacklotus_blue_plugins:

networks:
  blacklotus-network:
    external: true
