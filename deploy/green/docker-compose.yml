services:
  app:
    image: ghcr.io/${GITHUB_USER}/blacklotuscms:latest
    container_name: blacklotus-green-app
    ports:
      - "3002:3000"
    volumes:
      - /opt/apps/shared/uploads:/app/uploads
      - /opt/apps/shared/themes:/app/themes
      - /opt/apps/shared/plugins:/app/plugins
      - ./.env:/app/.env
    env_file:
      - .env
    networks:
      - blacklotus-network
    restart: unless-stopped

networks:
  blacklotus-network:
    external: true
